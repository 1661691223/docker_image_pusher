name: Docker Pages

on:
  # 在 Docker 或 SGLang workflow 完成后自动触发
  workflow_run:
    workflows: ["Docker", "Sync Production Tags (SGLang & vLLM)"]
    types:
      - completed
  # 手动触发
  workflow_dispatch:
  # push 到 main 分支时触发（修改 pages 相关文件，images.txt 由 workflow_run 触发）
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'pages/**'
      - 'data/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          pip install cryptography

      - name: Download sync result from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: successful-syncs
          path: /tmp/
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Collect version data
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
        run: |
          chmod +x scripts/collect_versions.sh

          # 优先使用 docker/sglang 同步成功列表，失败或跳过的镜像不收集
          if [ -f /tmp/successful_syncs.txt ] && [ -s /tmp/successful_syncs.txt ]; then
            echo "Using successful sync list from artifact"
            bash scripts/collect_versions.sh --file /tmp/successful_syncs.txt
          else
            bash scripts/collect_versions.sh
          fi
          
          # 合并 sglang/vllm tags（如果存在）
          python3 -c "
          import json, os, glob

          with open('data/versions.json', 'r') as f:
              data = json.load(f)

          tag_files = glob.glob('data/*_tags.json')

          # 去重: name + namespace + tag + platform 唯一
          # 已有记录保留原始 build_time/run_id，不被 tag 文件的新时间戳覆盖
          seen = {}
          for img in data['images']:
              key = (img.get('name'), img.get('namespace', ''), img.get('tag'), img.get('platform', ''))
              seen[key] = img

          new_count = 0
          for tf in tag_files:
              file_new = 0
              with open(tf, 'r') as f:
                  tags = json.load(f)
              for tag in tags:
                  key = (tag.get('name'), tag.get('namespace', ''), tag.get('tag'), tag.get('platform', ''))
                  if key not in seen:
                      seen[key] = tag
                      new_count += 1
                      file_new += 1
              print(f'Added {file_new} new tags from {tf}, skipped {len(tags) - file_new} existing')

          data['images'] = list(seen.values())

          with open('data/versions.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f'Total images after merge: {len(data[\"images\"])}')
          "

      - name: Generate page
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
          PAGE_MASTER_PASSWORD: ${{ secrets.PAGE_MASTER_PASSWORD }}
          PAGE_USERS: ${{ secrets.PAGE_USERS }}
          PAGE_SESSION_DAYS: ${{ secrets.PAGE_SESSION_DAYS }}
        run: |
          chmod +x scripts/generate_page.sh
          bash scripts/generate_page.sh

      - name: Commit version data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/versions.json
          # 只在有变化时提交
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update version data [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
