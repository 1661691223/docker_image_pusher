name: Sync Production Tags (SGLang & vLLM)

on:
  schedule:
    - cron: '0 7,15,23 * * *'
    # 对应北京时间 15:00 23:00 07:00
  workflow_dispatch:

env:
  ACR_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ACR_NAMESPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  DOCKER_CLI_EXPERIMENTAL: enabled

jobs:
  sync-tags:
    name: Sync ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sglang
            source_repo: lmsysorg/sglang
            target_name: sglang
            # SGLang 原有过滤逻辑保持不变
            filter_cmd: "grep -vx dev | grep -vx latest | grep -v main | grep -v sha256"
          - name: vllm
            source_repo: vllm/vllm-openai
            target_name: vllm-openai
            # vLLM 严格匹配 vX.Y.Z 纯发布版，排除 -cu130 / -rc / -dev 等
            filter_cmd: "grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$'"

    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Fetch Tags and Sync (${{ matrix.name }})
        env:
          SOURCE_REPO: ${{ matrix.source_repo }}
          TARGET_NAME: ${{ matrix.target_name }}
        run: |
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${SOURCE_REPO}/tags?page_size=100" | \
            jq -r '.results[] | .name' | \
            ${{ matrix.filter_cmd }} | \
            head -n 30)

          echo "=== [${TARGET_NAME}] Checked and filtered tags ==="
          echo "$TAGS"
          echo "=========================================="

          if [ -z "$TAGS" ]; then
            echo "No valid tags found for ${TARGET_NAME}. Exiting."
            echo "NEW_COUNT=0" >> $GITHUB_ENV
            echo "SKIP_COUNT=0" >> $GITHUB_ENV
            echo "SYNCED_TAGS=" >> $GITHUB_ENV
            exit 0
          fi

          NEW_COUNT=0
          SKIP_COUNT=0
          FAIL_COUNT=0
          SYNCED_TAGS=""
          SYNC_RESULT=""

          # 中文化错误信息
          translate_error() {
              local err="$1"
              if echo "$err" | grep -qi "manifest.*not found\|manifest unknown"; then
                  echo "镜像不存在"
              elif echo "$err" | grep -qi "unauthorized\|authentication required"; then
                  echo "认证失败"
              elif echo "$err" | grep -qi "toomanyrequests\|rate limit\|too many requests"; then
                  echo "触发速率限制"
              elif echo "$err" | grep -qi "dial tcp.*no such host\|Name or service not known\|lookup"; then
                  echo "无法解析域名"
              elif echo "$err" | grep -qi "i/o timeout\|connection timed out\|TLS handshake timeout"; then
                  echo "网络超时"
              elif echo "$err" | grep -qi "connection refused"; then
                  echo "连接被拒绝"
              elif echo "$err" | grep -qi "denied"; then
                  echo "无权限访问"
              else
                  echo "拉取失败"
              fi
          }

          for TAG in $TAGS; do
            SOURCE_IMAGE="${SOURCE_REPO}:${TAG}"
            TARGET_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${TARGET_NAME}:${TAG}"

            echo "------------------------------------------"
            echo "[${TARGET_NAME}] Checking: $TARGET_IMAGE"

            if docker manifest inspect "$TARGET_IMAGE" > /dev/null 2>&1; then
              echo "✅ ${TAG} already exists in ACR, skipping."
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            echo "🚀 Syncing $SOURCE_IMAGE ..."

            docker pull "$SOURCE_IMAGE" > /tmp/pull_log.txt 2>&1; PULL_EXIT=$?
            cat /tmp/pull_log.txt
            if [ $PULL_EXIT -eq 0 ]; then
              docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE"
              docker push "$TARGET_IMAGE"
              NEW_COUNT=$((NEW_COUNT + 1))
              SYNCED_TAGS="${SYNCED_TAGS}${TAG} "
              SYNC_RESULT="${SYNC_RESULT}- ✅ \`${TAG}\`
"
              echo "🎉 ${TAG} synced successfully!"
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              PULL_ERR=$(grep -iE "Error response|error:|manifest|unauthorized|denied|timeout|refused|not found|EOF|TLS" /tmp/pull_log.txt | tail -1)
              [ -z "$PULL_ERR" ] && PULL_ERR=$(tail -3 /tmp/pull_log.txt)
              REASON=$(translate_error "$PULL_ERR")
              SYNC_RESULT="${SYNC_RESULT}- ❌ \`${TAG}\` — **${REASON}**
"
              echo "❌ Failed to pull $SOURCE_IMAGE, skipping."
              continue
            fi

            docker rmi -f "$SOURCE_IMAGE" "$TARGET_IMAGE"
            docker system prune -f

            echo "Current Disk Usage:"
            df -h /
          done

          echo "NEW_COUNT=$NEW_COUNT" >> $GITHUB_ENV
          echo "SKIP_COUNT=$SKIP_COUNT" >> $GITHUB_ENV
          echo "FAIL_COUNT=$FAIL_COUNT" >> $GITHUB_ENV
          echo "SYNCED_TAGS=$SYNCED_TAGS" >> $GITHUB_ENV
          echo "SYNC_RESULT<<EOF" >> $GITHUB_ENV
          echo "$SYNC_RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 钉钉通知
        if: always()
        env:
          NEW_COUNT: ${{ env.NEW_COUNT }}
          SKIP_COUNT: ${{ env.SKIP_COUNT }}
          FAIL_COUNT: ${{ env.FAIL_COUNT }}
          SYNCED_TAGS: ${{ env.SYNCED_TAGS }}
          SYNC_RESULT: ${{ env.SYNC_RESULT }}
        run: |
          [ -z "${{ secrets.WEBHOOK_URL }}" ] && exit 0

          N_COUNT=${NEW_COUNT:-0}
          K_COUNT=${SKIP_COUNT:-0}
          F_COUNT=${FAIL_COUNT:-0}
          TARGET_NAME="${{ matrix.target_name }}"

          if [ "$F_COUNT" -gt 0 ]; then
            TITLE="❌镜像 ${TARGET_NAME} 同步异常"
            SUMMARY="成功 **${N_COUNT}** · 失败 **${F_COUNT}** · 跳过 **${K_COUNT}**"
            DETAIL="${SYNC_RESULT:-}"
          elif [ "$N_COUNT" -gt 0 ]; then
            TITLE="✅镜像 ${TARGET_NAME} 同步完成"
            SUMMARY="新增 **${N_COUNT}** · 跳过 **${K_COUNT}**"
            DETAIL="${SYNC_RESULT:-}"
          else
            TITLE="☕镜像 ${TARGET_NAME} 无新标签"
            SUMMARY="跳过 **${K_COUNT}**"
            DETAIL="无新标签需要同步"
          fi

          MARKDOWN="## ${TITLE}
          > ${SUMMARY}

          ---
          ${DETAIL}

          ---
          🔗 [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          JSON_PAYLOAD=$(jq -n --arg title "$TITLE" --arg text "$MARKDOWN" \
            '{"msgtype":"markdown","markdown":{"title":$title,"text":$text}}')
          curl -s -X POST -H "Content-Type: application/json;charset=utf-8" \
            -d "$JSON_PAYLOAD" "${{ secrets.WEBHOOK_URL }}"

      - name: Final Cleanup
        if: always()
        run: docker system prune -a -f

      - name: Save synced tags (${{ matrix.name }})
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: ${{ matrix.source_repo }}
          TARGET_NAME: ${{ matrix.target_name }}
          SYNCED_TAGS: ${{ env.SYNCED_TAGS }}
        run: |
          mkdir -p data
          JSON_FILE="data/${TARGET_NAME}_tags.json"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # 只保存实际同步成功的标签，失败的标签不写入 *_tags.json
          if [ -z "${SYNCED_TAGS:-}" ]; then
            echo "No tags were synced for ${TARGET_NAME}, skipping save."
            exit 0
          fi

          python3 -c "
          import json, os

          synced = os.environ.get('SYNCED_TAGS', '').strip().split()
          if not synced:
              print('No synced tags to save.')
              exit(0)

          registry = os.environ.get('ACR_REGISTRY', '')
          source_repo = os.environ.get('SOURCE_REPO', '')
          namespace = source_repo.split('/')[0] if '/' in source_repo else ''
          target_name = os.environ.get('TARGET_NAME', '')
          run_id = os.environ.get('GITHUB_RUN_ID', 'manual')
          timestamp = '$TIMESTAMP'
          json_file = '$JSON_FILE'

          records = []
          for tag in synced:
              records.append({
                  'registry': registry,
                  'namespace': namespace,
                  'name': target_name,
                  'tag': tag,
                  'platform': '',
                  'build_time': timestamp,
                  'run_id': run_id
              })

          existing = []
          try:
              with open(json_file, 'r') as f:
                  existing = json.load(f)
          except Exception:
              pass

          # 保留已有标签的原始 build_time/run_id
          seen = {}
          for item in existing:
              seen[item['tag']] = item
          new_added = 0
          for item in records:
              if item['tag'] not in seen:
                  seen[item['tag']] = item
                  new_added += 1

          merged = list(seen.values())

          with open(json_file, 'w') as f:
              json.dump(merged, f, indent=2, ensure_ascii=False)

          print(f'Saved {new_added} new {target_name} tags, {len(merged)} total to {json_file}')
          "

          git add "$JSON_FILE"
          if git diff --cached --quiet; then
            echo "No ${TARGET_NAME} tag changes to commit"
          else
            git commit -m "chore: update ${TARGET_NAME} tags [skip ci]"
            # 推送前 rebase 远端最新提交，防止并发矩阵任务导致非快进推送失败
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase conflict, using our freshly-generated tag data..."
              git checkout --ours "$JSON_FILE"
              git add "$JSON_FILE"
              git rebase --continue
            fi
            git push
          fi

