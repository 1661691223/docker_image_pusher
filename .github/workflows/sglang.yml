name: Sync SGLang Production Tags

on:
  schedule:
    - cron: '0 7,15,23 * * *'
    # 对应北京时间 15:00 23:00 07:00
  workflow_dispatch: 

env:
  ACR_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ACR_NAMESPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  SOURCE_REPO: "lmsysorg/sglang"
  DOCKER_CLI_EXPERIMENTAL: enabled

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    steps:
      # 1. 前置处理：极限清理磁盘空间（腾出约 30GB+）
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # 2. 登录 ACR
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 3. 精确获取、过滤并同步镜像
      - name: Fetch Tags and Sync
        run: |
          # 逻辑说明：
          # 1. 获取最近 30 个 Tag
          # 2. grep -vx "dev" : 精确匹配并删除名为 "dev" 的行 (-x 代表整行匹配)
          # 3. grep -vx "latest" : 同上，排除 "latest"
          # 4. grep -v "main" : 模糊匹配，删除任何包含 "main" 的行
          # 5. grep -v "sha256" : 排除自动生成的指纹标签
          
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${{ env.SOURCE_REPO }}/tags?page_size=50" | \
            jq -r '.results[] | .name' | \
            grep -vx "dev" | \
            grep -vx "latest" | \
            grep -v "main" | \
            grep -v "sha256" | \
            head -n 30)
          
          echo "Checked and filtered tags: $TAGS"

          if [ -z "$TAGS" ]; then
            echo "No valid tags found after filtering. Exiting."
            exit 0
          fi

          for TAG in $TAGS; do
            SOURCE_IMAGE="${{ env.SOURCE_REPO }}:$TAG"
            TARGET_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/sglang:$TAG"
            
            echo "------------------------------------------"
            echo "Checking: $TARGET_IMAGE"

            # 4. 预检：如果 ACR 已存在则跳过
            if docker manifest inspect $TARGET_IMAGE > /dev/null 2>&1; then
              echo "✅ $TAG 已存在于 ACR，跳过同步。"
              continue
            fi
            
            echo "🚀 开始同步 $SOURCE_IMAGE ..."

            # 5. 执行同步：拉取 -> 打标 -> 推送
            if docker pull $SOURCE_IMAGE; then
              docker tag $SOURCE_IMAGE $TARGET_IMAGE
              docker push $TARGET_IMAGE
              echo "🎉 $TAG 同步成功！"
            else
              echo "❌ 拉取 $SOURCE_IMAGE 失败，跳过。"
              continue
            fi

            # 6. 关键清理：每步结束后删除镜像，防止磁盘撑爆
            docker rmi -f $SOURCE_IMAGE $TARGET_IMAGE
            docker system prune -f
            
            echo "Current Disk Usage:"
            df -h /
          done

      # 7. 最终全局清理
      - name: Final Cleanup
        if: always()
        run: |
          docker system prune -a -f

      # 8. 保存同步记录供 Pages 使用
      - name: Save synced tags
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 重新获取本次同步的 tag 列表
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${{ env.SOURCE_REPO }}/tags?page_size=50" | \
            jq -r '.results[] | .name' | \
            grep -vx "dev" | \
            grep -vx "latest" | \
            grep -v "main" | \
            grep -v "sha256" | \
            head -n 30)

          mkdir -p data

          # 生成 sglang_tags.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          python3 -c "
          import json, os, sys

          tags = '''$TAGS'''.strip().split('\n')
          tags = [t.strip() for t in tags if t.strip()]

          registry = os.environ.get('ACR_REGISTRY', '')
          namespace = os.environ.get('ACR_NAMESPACE', '')
          run_id = os.environ.get('GITHUB_RUN_ID', 'manual')
          timestamp = '$TIMESTAMP'

          records = []
          for tag in tags:
              records.append({
                  'registry': registry,
                  'namespace': namespace,
                  'name': 'sglang',
                  'tag': tag,
                  'platform': '',
                  'build_time': timestamp,
                  'run_id': run_id
              })

          # 合并已有数据
          existing = []
          try:
              with open('data/sglang_tags.json', 'r') as f:
                  existing = json.load(f)
          except:
              pass

          # 去重: 同 tag 保留最新的
          seen = {}
          for item in existing + records:
              seen[item['tag']] = item

          merged = list(seen.values())

          with open('data/sglang_tags.json', 'w') as f:
              json.dump(merged, f, indent=2, ensure_ascii=False)

          print(f'Saved {len(records)} new sglang tags, {len(merged)} total')
          "

          # 提交到仓库
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sglang_tags.json
          if git diff --cached --quiet; then
            echo "No sglang tag changes to commit"
          else
            git commit -m "chore: update sglang tags [skip ci]"
            git push
          fi
