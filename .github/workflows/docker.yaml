name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 增加可用磁盘空间
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          # 如果空间还是不够用，可以把以下开启，清理出更多空间
          # remove-android: 'true'
          # remove-codeql: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: Restart docker
        run: sudo service docker restart

      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image Aliyun
        run: |
          docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

          # ==================== 第一阶段：数据预处理，判断镜像是否重名 ====================
          declare -A duplicate_images
          declare -A temp_map
          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              image=$(echo "$line" | awk '{print $NF}')
              image="${image%%@*}"
              echo "image $image"

              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              echo "image_name_tag $image_name_tag"

              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              echo "name_space: $name_space"
              name_space="${name_space}_"

              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
              echo "image_name: $image_name"

              if [[ -n "${temp_map[$image_name]}" ]]; then
                   if [[ "${temp_map[$image_name]}" != $name_space ]]; then
                      echo "duplicate image name: $image_name"
                      duplicate_images[$image_name]="true"
                   fi
              else
                  temp_map[$image_name]=$name_space
              fi
          done < images.txt

          # ==================== 第二阶段：拉取、预检、推送 ====================
          SUCCESS_COUNT=0
          FAILURE_COUNT=0
          SKIP_COUNT=0
          SYNC_RESULT=""
          SUCCESS_LINES=""
          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
              echo "platform is $platform"

              if [ -z "$platform" ]; then
                  platform_prefix=""
              else
                  platform_prefix="${platform//\//_}_"
              fi
              echo "platform_prefix is $platform_prefix"

              image=$(echo "$line" | awk '{print $NF}')
              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

              name_space_prefix=""
              if [[ -n "${duplicate_images[$image_name]}" ]]; then
                 if [[ -n "${name_space}" ]]; then
                    name_space_prefix="${name_space}_"
                 fi
              fi

              image_name_tag="${image_name_tag%%@*}"
              new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag"

              # ========== 🔍 新增：ACR 预检，已存在则跳过 ==========
              echo "------------------------------------------"
              echo "🔍 Checking if target exists: $new_image"
              if docker manifest inspect "$new_image" > /dev/null 2>&1; then
                  echo "✅ $new_image already exists in ACR, skipping pull/push."
                  SKIP_COUNT=$((SKIP_COUNT + 1))
                  echo "=========================================="
                  continue
              fi
              echo "⬇️  Target not found, proceeding with pull..."
              # ================================================

              echo "docker pull $line"
              if docker pull $line; then
                  echo "docker tag $image $new_image"
                  docker tag $image $new_image

                  echo "docker push $new_image"
                  docker push $new_image

                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  SYNC_RESULT="${SYNC_RESULT}- ✅ ${new_image##*/}
          "
                  SUCCESS_LINES="${SUCCESS_LINES}${line}
          "
              else
                  FAILURE_COUNT=$((FAILURE_COUNT + 1))
                  SYNC_RESULT="${SYNC_RESULT}- ❌ ${line}: pull failed
          "
                  echo "❌ Failed to pull $line, skipping."
              fi

              echo "开始清理磁盘空间"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
              docker rmi $image || true
              docker rmi $new_image || true
              echo "磁盘空间清理完毕"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
          done < images.txt

          # 保存成功同步的镜像行，供 pages workflow 收集版本用
          # 始终创建文件(即使为空)，确保 artifact 能被上传
          echo "$SUCCESS_LINES" > /tmp/successful_syncs.txt

          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_ENV
          echo "FAILURE_COUNT=$FAILURE_COUNT" >> $GITHUB_ENV
          echo "SKIP_COUNT=$SKIP_COUNT" >> $GITHUB_ENV
          echo "SYNC_RESULT<<EOF" >> $GITHUB_ENV
          echo "$SYNC_RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 钉钉通知
        if: always()
        run: |
          [ -z "${{ secrets.WEBHOOK_URL }}" ] && exit 0

          S_COUNT=${SUCCESS_COUNT:-0}
          F_COUNT=${FAILURE_COUNT:-0}
          K_COUNT=${SKIP_COUNT:-0}

          if [ "$F_COUNT" -gt 0 ]; then
            TITLE="❌ 镜像同步异常"
            SUMMARY="错误: ${F_COUNT} | 成功: ${S_COUNT} | 跳过: ${K_COUNT}"
          elif [ "$S_COUNT" -gt 0 ]; then
            TITLE="✅ 镜像同步完成"
            SUMMARY="成功: ${S_COUNT} | 跳过: ${K_COUNT}"
          else
            TITLE="☕ 无新镜像"
            SUMMARY="全部跳过: ${K_COUNT}"
          fi

          DETAIL="${SYNC_RESULT:-}"
          MARKDOWN="## ${TITLE}
          > ${SUMMARY}

          ${DETAIL}

          🔗 [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          JSON_PAYLOAD=$(jq -n --arg title "$TITLE" --arg text "$MARKDOWN" \
            '{"msgtype":"markdown","markdown":{"title":$title,"text":$text}}')
          curl -s -X POST -H "Content-Type: application/json;charset=utf-8" \
            -d "$JSON_PAYLOAD" "${{ secrets.WEBHOOK_URL }}"

      - name: Upload sync result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: successful-syncs
          path: /tmp/successful_syncs.txt
          retention-days: 1

